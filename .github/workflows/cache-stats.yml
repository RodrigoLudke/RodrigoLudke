name: Cache GitHub Stats

on:
  schedule:
    - cron: "0 9 * * *"    # todo dia às 06:00 no horário de Brasília
  workflow_dispatch:        # permite rodar na mão pelo botão

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Baixar os cards
        run: |
          mkdir -p assets

          baixar() {
            url="$1"; destino="$2"
            tmp=$(mktemp)

            if ! curl -sfL --max-time 30 "$url" -o "$tmp"; then
              echo "::warning::Download de $destino falhou — mantendo versão anterior"
              return 0
            fi

            # rejeita se não for SVG ou se for o card de erro
            if ! head -c 300 "$tmp" | grep -qi "<svg"; then
              echo "::warning::$destino não é um SVG — mantendo versão anterior"
              return 0
            fi
            if grep -qi "Something went wrong\|Error Fetching\|Maximum retries" "$tmp"; then
              echo "::warning::$destino veio com erro — mantendo versão anterior"
              return 0
            fi

            mv "$tmp" "assets/$destino"
            echo "✓ $destino atualizado"
          }

          baixar "https://github-readme-stats.vercel.app/api?username=RodrigoLudke&show_icons=true&theme=radical" "stats.svg"
          baixar "https://github-readme-stats.vercel.app/api/top-langs/?username=RodrigoLudke&layout=compact&theme=radical" "top-langs.svg"

      - name: Commitar se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/
          git diff --staged --quiet || git commit -m "chore: atualiza cards de stats"
          git push
