name: Cache GitHub Stats

on:
  schedule:
    - cron: "0 9 * * *"    # todo dia às 06:00 no horário de Brasília
  workflow_dispatch:        # permite rodar na mão pelo botão

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Baixar os cards
        run: |
          mkdir -p assets

          baixar() {
            url="$1"; destino="$2"
            tmp=$(mktemp)

            for tentativa in 1 2 3 4 5; do
              codigo=$(curl -sL --max-time 30 -w "%{http_code}" "$url" -o "$tmp")
              echo "[$destino] tentativa $tentativa → HTTP $codigo"

              if [ "$codigo" = "200" ] && head -c 300 "$tmp" | grep -qi "<svg"; then
                if grep -qi "Something went wrong\|Error Fetching\|Maximum retries" "$tmp"; then
                  echo "[$destino] SVG de erro, tentando de novo"
                else
                  mv "$tmp" "assets/$destino"
                  echo "✓ $destino atualizado"
                  return 0
                fi
              fi

              sleep $((tentativa * 15))
            done

            echo "::warning::$destino falhou em todas as tentativas"
            if [ ! -f "assets/$destino" ]; then
              echo "::error::$destino nunca foi baixado — não há cache pra manter"
            fi
          }

          baixar "https://github-readme-stats.vercel.app/api?username=RodrigoLudke&show_icons=true&theme=radical" "stats.svg"
          baixar "https://github-readme-stats.vercel.app/api/top-langs/?username=RodrigoLudke&layout=compact&theme=radical" "top-langs.svg"
          
      - name: Commitar se mudou
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add assets/
          if git diff --staged --quiet; then
            echo "Nada mudou"
            exit 0
          fi

          git commit -m "chore: atualiza cards de stats"

          for tentativa in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            echo "Push rejeitado, rebase e tentando de novo ($tentativa/3)"
            sleep 5
          done

          echo "::error::Não consegui dar push após 3 tentativas"
          exit 1
